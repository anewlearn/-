services:
  - type: web
    name: styletap-web
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python -m py_compile server.py
    startCommand: python server.py
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: DISABLE_SERVER_DATABASE
        value: "true"
      - key: DISABLE_RUNTIME_API_KEY
        value: "true"
      - key: OPENAI_BASE_URL
        value: https://ai-us.hctopup.com/v1
      - key: OPENAI_MODEL
        value: gpt-5.5
      - key: OPENAI_IMAGE_MODEL
        value: gpt-image-2
      - key: OPENAI_REASONING_EFFORT
        value: xhigh
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_API_KEYS
        sync: false
      - key: AI_PROVIDER
        value: openai
      - key: GOOGLE_BASE_URL
        value: https://generativelanguage.googleapis.com/v1beta
      - key: GOOGLE_MODEL
        value: gemini-3.5-flash
      - key: GOOGLE_IMAGE_MODEL
        value: gemini-3.1-flash-image
      - key: GOOGLE_API_KEY
        sync: false
      - key: GOOGLE_API_KEYS
        sync: false
      - key: WECHAT_APP_ID
        sync: false
      - key: WECHAT_APP_SECRET
        sync: false
      - key: WECHAT_SESSION_SECRET
        sync: false
      - key: WECHAT_PAY_MCH_ID
        sync: false
      - key: WECHAT_PAY_SERIAL_NO
        sync: false
      - key: WECHAT_PAY_PRIVATE_KEY
        sync: false
      - key: WECHAT_PAY_NOTIFY_URL
        value: https://da-xia.onrender.com/api/wechat/pay/notify
      - key: WECHAT_PAY_DEFAULT_AMOUNT_CENTS
        value: "990"
